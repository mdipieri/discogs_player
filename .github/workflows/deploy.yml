name: Deploy su GitHub Pages

# L'ambiente github-pages accetta deploy solo dal branch predefinito del repo
# (claude/vinyl-collection-streaming-oosmze): trigger solo da lì, altrimenti i
# run partiti da altri branch falliscono e cancellano quelli buoni (stesso
# gruppo di concorrenza).
on:
  push:
    branches: [claude/vinyl-collection-streaming-oosmze]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
