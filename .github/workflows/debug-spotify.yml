name: Debug Spotify token
on: workflow_dispatch
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Verifica credenziali e richiesta token
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: |
          node -e '
            const id = process.env.SPOTIFY_CLIENT_ID || "";
            const sec = process.env.SPOTIFY_CLIENT_SECRET || "";
            console.log("client id length:", id.length, "| secret length:", sec.length);
            if (!id || !sec) { console.log("SECRET MANCANTE"); process.exit(0); }
            const auth = Buffer.from(`${id}:${sec}`).toString("base64");
            fetch("https://accounts.spotify.com/api/token", {
              method: "POST",
              headers: { Authorization: "Basic " + auth, "Content-Type": "application/x-www-form-urlencoded" },
              body: "grant_type=client_credentials",
            }).then(async (r) => {
              console.log("token HTTP status:", r.status);
              const t = await r.text();
              console.log("token body (primi 200):", t.slice(0, 200));
              if (r.ok) {
                const tok = JSON.parse(t).access_token;
                const s = await fetch("https://api.spotify.com/v1/search?type=album&limit=2&q=" + encodeURIComponent("album:Violator artist:Depeche Mode"), { headers: { Authorization: "Bearer " + tok } });
                console.log("search HTTP status:", s.status);
                const sb = await s.json();
                console.log("primo album:", sb.albums?.items?.[0]?.name, "| id:", sb.albums?.items?.[0]?.id);
              }
            }).catch((e) => console.log("FETCH ERROR:", e.message));
          '
